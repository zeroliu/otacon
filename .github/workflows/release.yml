name: Release

# Publishes otacon to npm when a `vX.Y.Z` tag is pushed (see scripts/release.sh,
# run via `bun run release`, which bumps + tags + pushes WITHOUT publishing).
# Gates (typecheck/test/build) run BEFORE publish so a failing gate stops the publish.
#
# One publish job, routed by version suffix: a clean `vX.Y.Z` tag publishes to the
# `latest` dist-tag and creates a GitHub Release; a `vX.Y.Z-staging.<stamp>` tag (cut
# by `bun run release` on the `staging` branch, see scripts/release.sh) publishes to
# the `staging` dist-tag and creates NO GitHub Release.
on:
  push:
    tags:
      # Match release tags `vX.Y.Z` and `vX.Y.Z-staging.N` (must be quoted: a bare
      # leading `*` is invalid YAML). `v[0-9]*` matches both (e.g. `v0.1.4-staging.0`)
      # and avoids spinning up a publish run for unrelated `v`-prefixed tags (e.g.
      # `vendor-snapshot`); the version guard backstops it.
      - 'v[0-9]*'

# Serializes concurrent runs of this workflow for a given ref so two in-flight
# pushes of the same tag don't race. (It does NOT stop a sequential re-push from
# re-running — npm rejecting a duplicate version is the real double-publish guard.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # cap a hung publish/release instead of inheriting the 6h default
    permissions:
      contents: write # create the GitHub Release for the tag
      id-token: write # mint the OIDC token npm exchanges for trusted publishing (+ provenance)
    steps:
      # Third-party actions are pinned to a commit SHA (not a mutable tag) because
      # this job holds id-token:write — the OIDC token authorizes the npm publish, so
      # a moved tag could otherwise inject code into a credentialed publish. Bump the
      # SHA + comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history+tags so `gh release create --generate-notes` can range from the previous tag

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Trusted publishing needs Node >= 22.14. No registry-url / NODE_AUTH_TOKEN:
      # OIDC replaces the token, and a setup-node .npmrc auth line (with always-auth)
      # would only get in the way.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      # Trusted publishing requires npm CLI >= 11.5.1; the bundled npm is older.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Guard: the pushed tag must match package.json's version, or we'd publish a
      # mismatched version. GITHUB_REF_NAME is the tag name (e.g. v0.2.0).
      - name: Verify tag matches package.json version
        run: |
          PKG_TAG="v$(node -p "require('./package.json').version")"
          if [ "$PKG_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version ($PKG_TAG)" >&2
            exit 1
          fi

      # Route the publish by version suffix: a `-staging.` prerelease version goes to
      # the `staging` dist-tag; any other (clean) version goes to `latest`. The clean
      # vs prerelease split here also gates the GitHub Release step below.
      - name: Derive dist tag from version
        id: disttag
        run: |
          TAG=$(node -e "console.log(require('./package.json').version.includes('-staging.') ? 'staging' : 'latest')")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # Publish via npm trusted publishing (OIDC) — no stored token. npm exchanges
      # the id-token for a short-lived credential; this works only because a Trusted
      # Publisher for this repo + workflow file is configured on npmjs.com (see
      # RELEASING.md). Provenance is attached automatically under trusted publishing.
      # prepublishOnly also runs `npm run build` — harmless, it just rebuilds dist/.
      # --tag routes to the dist-tag derived above (latest for clean tags, staging
      # for `-staging.N` prereleases).
      - name: Publish to npm
        run: npm publish --tag ${{ steps.disttag.outputs.tag }} --access public

      # Clean (latest) tags get a GitHub Release; staging prereleases do not.
      - name: Create GitHub Release
        if: steps.disttag.outputs.tag == 'latest'
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
